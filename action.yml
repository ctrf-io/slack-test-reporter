name: 'Slack Test Reporter'
description: 'Send CTRF test results to Slack with threading support'
author: 'Stephens Meiring (fork)'
inputs:
  command:
    description: 'Command to run (results, failed, flaky, ai, custom)'
    required: true
    default: 'results'
  path:
    description: 'Path to the CTRF file'
    required: true
  template-path:
    description: 'Path to the Handlebars template file (for custom command)'
    required: false
  title:
    description: 'Title of notification'
    required: false
  prefix:
    description: 'Custom text to add as a prefix'
    required: false
  suffix:
    description: 'Custom text to add as a suffix'
    required: false
  thread-ts:
    description: 'Thread timestamp to reply to an existing thread'
    required: false
  reply-broadcast:
    description: 'Also send threaded reply to the channel'
    required: false
    default: 'false'
  update-ts:
    description: 'Timestamp of a message to update'
    required: false
  react:
    description: 'Add a reaction to the parent message'
    required: false
    default: 'false'
  on-fail-only:
    description: 'Send message only if there are failed tests'
    required: false
    default: 'false'
  consolidated:
    description: 'Consolidate all failure summaries into a single message'
    required: false
    default: 'false'
  auto-thread:
    description: 'Automatically thread individual failure details'
    required: false
    default: 'true'
  slack-token:
    description: 'Slack API Bot Token'
    required: false
  channel-id:
    description: 'Slack Channel ID'
    required: false
  webhook-url:
    description: 'Slack Incoming Webhook URL'
    required: false

outputs:
  ts:
    description: 'The timestamp of the sent message'
    value: ${{ steps.run-report.outputs.ts }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install

    - name: Run Slack Reporter
      id: run-report
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SLACK_OAUTH_TOKEN: ${{ inputs.slack-token }}
        SLACK_CHANNEL_ID: ${{ inputs.channel-id }}
        SLACK_WEBHOOK_URL: ${{ inputs.webhook-url }}
      run: |
        ARGS="${{ inputs.command }} ${{ inputs.path }}"
        
        if [ -n "${{ inputs.template-path }}" ]; then ARGS="$ARGS ${{ inputs.template-path }}"; fi
        if [ -n "${{ inputs.title }}" ]; then ARGS="$ARGS --title \"${{ inputs.title }}\""; fi
        if [ -n "${{ inputs.prefix }}" ]; then ARGS="$ARGS --prefix \"${{ inputs.prefix }}\""; fi
        if [ -n "${{ inputs.suffix }}" ]; then ARGS="$ARGS --suffix \"${{ inputs.suffix }}\""; fi
        if [ -n "${{ inputs.thread-ts }}" ]; then ARGS="$ARGS --threadTs ${{ inputs.thread-ts }}"; fi
        if [ "${{ inputs.reply-broadcast }}" == "true" ]; then ARGS="$ARGS --replyBroadcast"; fi
        if [ -n "${{ inputs.update-ts }}" ]; then ARGS="$ARGS --updateTs ${{ inputs.update-ts }}"; fi
        if [ "${{ inputs.react }}" == "true" ]; then ARGS="$ARGS --react"; fi
        if [ "${{ inputs.on-fail-only }}" == "true" ]; then ARGS="$ARGS --onFailOnly"; fi
        if [ "${{ inputs.consolidated }}" == "true" ]; then ARGS="$ARGS --consolidated"; fi
        if [ "${{ inputs.auto-thread }}" == "false" ]; then ARGS="$ARGS --autoThread false"; fi
        
        # Always use returnTs to capture the output
        # Use npx tsx to run from source if needed, or just node since it's type: module
        TS_JSON=$(node src/cli.js $ARGS --returnTs)
        echo "TS_JSON=$TS_JSON"
        
        TS=$(echo "$TS_JSON" | grep '^{"ts":' | sed 's/.*"ts":"\([^"]*\)".*/\1/')
        echo "ts=$TS" >> $GITHUB_OUTPUT
